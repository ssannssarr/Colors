<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Rich Colors · 2‑Column Mobile Grid</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #f1f4f9;
            --text: #1e2a3a;
            --heading-start: #1e2a3a;
            --heading-end: #2c3e50;
            --badge-bg: #2c3e50;
            --badge-text: #ffffff;
            --stats-bg: #eef2ff;
            --input-bg: #ffffff;
            --input-border: #cbd5e1;
            --surface: #ffffff;
            --surface-2: #f8fafc;
            --surface-3: #f1f5f9;
            --text-strong: #0f172a;
            --text-muted: #475569;
            --border-soft: rgba(0,0,0,0.05);
            --shadow-1: 0 2px 6px rgba(0, 0, 0, 0.05);
            --shadow-2: 0 8px 16px rgba(0, 0, 0, 0.1);
            --footer-text: #5b6e8c;
            --footer-border: #e2e8f0;
            --modal-overlay: rgba(0, 0, 0, 0.7);
            --modal-code-bg: #0f172a;
            --modal-code-text: #e2e8f0;
            --button-bg: #3b82f6;
            --button-text: #ffffff;
            --close-bg: #e2e8f0;
            --toggle-bg: #ffffff;
            --toggle-border: #cbd5e1;
        }

        body.dark-mode {
            color-scheme: dark;
            --bg: #0f172a;
            --text: #dbe6f4;
            --heading-start: #f8fafc;
            --heading-end: #93c5fd;
            --badge-bg: #1e293b;
            --badge-text: #e2e8f0;
            --stats-bg: #172554;
            --input-bg: #111827;
            --input-border: #334155;
            --surface: #111827;
            --surface-2: #172033;
            --surface-3: #1e293b;
            --text-strong: #f8fafc;
            --text-muted: #cbd5e1;
            --border-soft: rgba(148, 163, 184, 0.18);
            --shadow-1: 0 8px 18px rgba(2, 6, 23, 0.3);
            --shadow-2: 0 14px 28px rgba(2, 6, 23, 0.45);
            --footer-text: #94a3b8;
            --footer-border: #334155;
            --modal-overlay: rgba(2, 6, 23, 0.82);
            --modal-code-bg: #020617;
            --modal-code-text: #dbeafe;
            --button-bg: #2563eb;
            --button-text: #eff6ff;
            --close-bg: #334155;
            --toggle-bg: #111827;
            --toggle-border: #475569;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            font-family: 'Segoe UI', system-ui, -apple-system, 'Roboto', monospace;
            padding: 1.2rem;
            color: var(--text);
            transition: background 0.2s ease, color 0.2s ease;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 1.5rem;
            position: relative;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 600;
            background: linear-gradient(135deg, var(--heading-start), var(--heading-end));
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .badge {
            background: var(--badge-bg);
            color: var(--badge-text);
            padding: 0.2rem 1rem;
            border-radius: 60px;
            font-size: 0.7rem;
            display: inline-block;
            margin-top: 0.4rem;
        }

        .stats {
            margin-top: 0.5rem;
            font-size: 0.8rem;
            background: var(--stats-bg);
            display: inline-block;
            padding: 0.2rem 1rem;
            border-radius: 40px;
        }

        .theme-toggle {
            position: absolute;
            top: 0;
            right: 0;
            border: 1px solid var(--toggle-border);
            background: var(--toggle-bg);
            color: var(--text);
            border-radius: 999px;
            padding: 0.55rem 0.9rem;
            font-size: 0.8rem;
            cursor: pointer;
            box-shadow: var(--shadow-1);
            transition: background 0.2s ease, border-color 0.2s ease, color 0.2s ease;
        }

        .search-bar {
            margin: 1.2rem auto 1.5rem;
            max-width: 400px;
        }

        #searchInput {
            width: 100%;
            padding: 0.7rem 1rem;
            border-radius: 60px;
            border: 1px solid var(--input-border);
            font-size: 0.9rem;
            background: var(--input-bg);
            color: var(--text);
            font-family: inherit;
        }

        /* Color grid — default auto-fill */
        .color-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 0.8rem;
            margin-top: 0.5rem;
        }

        /* Mobile: force exactly 2 columns */
        @media (max-width: 640px) {
            body {
                padding: 0.8rem;
            }
            .theme-toggle {
                position: static;
                margin-bottom: 0.8rem;
            }
            .color-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 0.7rem;
            }
            .color-name {
                font-size: 0.8rem;
            }
            .color-hex {
                font-size: 0.65rem;
            }
            .color-swatch {
                height: 80px;
            }
        }

        /* Very narrow phones (below 400px) still keep 2 columns */
        @media (max-width: 480px) {
            .color-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 0.6rem;
            }
            .color-info {
                padding: 0.5rem;
            }
        }

        .color-card {
            background: var(--surface);
            border-radius: 18px;
            overflow: hidden;
            cursor: pointer;
            transition: 0.1s ease;
            box-shadow: var(--shadow-1);
            border: 1px solid var(--border-soft);
        }

        .color-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-2);
        }

        .color-swatch {
            height: 98px;
            width: 100%;
            border-bottom: 1px solid var(--border-soft);
        }

        .color-info {
            padding: 0.7rem 0.8rem 0.9rem;
            background: var(--surface);
        }

        .color-name {
            font-weight: 650;
            font-size: 0.9rem;
            font-family: 'SF Mono', 'Fira Code', monospace;
            word-break: break-word;
            color: var(--text-strong);
        }

        .color-hex {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-top: 0.2rem;
            background: var(--surface-2);
            display: inline-block;
            padding: 0.15rem 0.5rem;
            border-radius: 20px;
            font-family: monospace;
        }

        .loading-placeholder {
            text-align: center;
            padding: 2rem;
            color: var(--text);
        }

        /* Modal styles */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--modal-overlay);
            backdrop-filter: blur(4px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: var(--surface);
            border-radius: 28px;
            max-width: 380px;
            width: 85%;
            padding: 1.5rem;
            text-align: center;
            animation: fadeIn 0.2s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.96); }
            to { opacity: 1; transform: scale(1); }
        }

        .modal-swatch {
            height: 110px;
            border-radius: 20px;
            margin-bottom: 1rem;
            border: 2px solid var(--surface-3);
        }

        .modal-color-name {
            font-size: 1.4rem;
            font-weight: 700;
            font-family: monospace;
            background: var(--surface-3);
            color: var(--text-strong);
            display: inline-block;
            padding: 0.2rem 1rem;
            border-radius: 40px;
            margin-bottom: 0.8rem;
        }

        .code-block {
            background: var(--modal-code-bg);
            color: var(--modal-code-text);
            padding: 0.6rem 0.8rem;
            border-radius: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin: 0.7rem 0;
        }

        .code-text {
            font-family: monospace;
            font-size: 0.85rem;
            word-break: break-all;
        }

        .copy-btn {
            background: var(--button-bg);
            border: none;
            color: var(--button-text);
            padding: 0.25rem 0.9rem;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 600;
            cursor: pointer;
        }

        .close-modal {
            background: var(--close-bg);
            border: none;
            padding: 0.4rem 1.2rem;
            border-radius: 40px;
            margin-top: 0.8rem;
            cursor: pointer;
            font-weight: 500;
            color: var(--text);
        }

        footer {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.7rem;
            color: var(--footer-text);
            border-top: 1px solid var(--footer-border);
            padding-top: 1rem;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <button class="theme-toggle" id="themeToggleBtn" type="button" aria-pressed="false">🌙 Dark mode</button>
        <h1>🎨 Rich Python · All Named Colors</h1>
        <div class="badge">X11 / CSS / SVG complete set</div>
        <div class="stats" id="colorCountDisplay">Loading 753 colors...</div>
        <div style="font-size: 0.7rem; margin-top: 0.2rem;">👇 tap any color → HEX & RGB + copy</div>
    </div>

    <div class="search-bar">
        <input type="text" id="searchInput" placeholder="🔍 Filter colors... (e.g., 'blue', 'gold')" autocomplete="off">
    </div>

    <div id="colorGridContainer" class="color-grid">
        <div class="loading-placeholder">✨ loading color swatches... ✨</div>
    </div>

    <footer>
        ✔ Every color supported by Rich (753 unique names) • 2‑column grid on mobile • click to copy HEX/RGB
    </footer>
</div>

<!-- Modal -->
<div id="colorModal" class="modal">
    <div class="modal-content">
        <div id="modalSwatch" class="modal-swatch"></div>
        <div id="modalColorName" class="modal-color-name"></div>
        <div class="code-block">
            <span id="modalHexCode" class="code-text"></span>
            <button class="copy-btn" id="copyHexBtn">📋 Copy HEX</button>
        </div>
        <div class="code-block">
            <span id="modalRgbCode" class="code-text"></span>
            <button class="copy-btn" id="copyRgbBtn">📋 Copy RGB</button>
        </div>
        <button class="close-modal" id="closeModalBtn">Close</button>
    </div>
</div>

    ];

    // Deduplicate and sort
    const uniqueColors = new Map();
    for (const [name, hex] of COLOR_RAW) if (!uniqueColors.has(name)) uniqueColors.set(name, hex);
    const allColors = Array.from(uniqueColors.entries()).sort((a, b) => a[0].localeCompare(b[0]));
    const TOTAL = allColors.length;
    document.getElementById('colorCountDisplay').innerText = `🎨 ${TOTAL} colors · Rich complete`;

    // DOM elements
    const container = document.getElementById('colorGridContainer');
    const searchInput = document.getElementById('searchInput');
    const themeToggleBtn = document.getElementById('themeToggleBtn');
    let colorCards = []; // store references for filtering

    function hexToRgb(hex) {
        let h = hex.slice(1);
        if (h.length === 3) h = h.split('').map(c => c + c).join('');
        return `rgb(${parseInt(h.slice(0,2),16)}, ${parseInt(h.slice(2,4),16)}, ${parseInt(h.slice(4,6),16)})`;
    }

    function applyTheme(theme) {
        const isDark = theme === 'dark';
        document.body.classList.toggle('dark-mode', isDark);
        themeToggleBtn.textContent = isDark ? '☀️ Light mode' : '🌙 Dark mode';
        themeToggleBtn.setAttribute('aria-pressed', String(isDark));
    }

    const savedTheme = localStorage.getItem('themePreference');
    const preferredTheme = savedTheme || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    applyTheme(preferredTheme);

    themeToggleBtn.addEventListener('click', () => {
        const nextTheme = document.body.classList.contains('dark-mode') ? 'light' : 'dark';
        localStorage.setItem('themePreference', nextTheme);
        applyTheme(nextTheme);
    });

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));
    }

    // Build cards in batches for performance
    let currentIndex = 0;
    const BATCH = 40;

    function buildCardElement(name, hex) {
        const card = document.createElement('div');
        card.className = 'color-card';
        card.setAttribute('data-name', name.toLowerCase());
        card.innerHTML = `
            <div class="color-swatch" style="background-color: ${hex};"></div>
            <div class="color-info">
                <div class="color-name">${escapeHtml(name)}</div>
                <div class="color-hex">${hex.toUpperCase()}</div>
            </div>
        `;
        card.addEventListener('click', () => showModal(name, hex));
        return card;
    }

    function renderBatch() {
        const fragment = document.createDocumentFragment();
        const end = Math.min(currentIndex + BATCH, allColors.length);
        for (let i = currentIndex; i < end; i++) {
            const [name, hex] = allColors[i];
            const card = buildCardElement(name, hex);
            fragment.appendChild(card);
            colorCards.push(card);
        }
        container.appendChild(fragment);
        currentIndex = end;
        if (currentIndex < allColors.length) {
            requestAnimationFrame(renderBatch);
        }
    }

    container.innerHTML = '';
    renderBatch();

    // Filter (show/hide based on search)
    function filterColors() {
        const term = searchInput.value.trim().toLowerCase();
        for (let i = 0; i < colorCards.length; i++) {
            const nameAttr = colorCards[i].getAttribute('data-name');
            if (!term || nameAttr.includes(term)) {
                colorCards[i].style.display = '';
            } else {
                colorCards[i].style.display = 'none';
            }
        }
    }
    searchInput.addEventListener('input', filterColors);

    // Modal handling
    const modal = document.getElementById('colorModal');
    const modalSwatch = document.getElementById('modalSwatch');
    const modalColorName = document.getElementById('modalColorName');
    const modalHex = document.getElementById('modalHexCode');
    const modalRgb = document.getElementById('modalRgbCode');
    let currentHex = '';

    function showModal(name, hex) {
        currentHex = hex;
        modalSwatch.style.backgroundColor = hex;
        modalColorName.innerText = name;
        modalHex.innerText = hex.toUpperCase();
        modalRgb.innerText = hexToRgb(hex);
        modal.style.display = 'flex';
    }

    function closeModal() {
        modal.style.display = 'none';
    }

    document.getElementById('copyHexBtn').onclick = () => {
        navigator.clipboard.writeText(currentHex.toUpperCase());
        alert('HEX copied: ' + currentHex.toUpperCase());
    };
    document.getElementById('copyRgbBtn').onclick = () => {
        const rgb = hexToRgb(currentHex);
        navigator.clipboard.writeText(rgb);
        alert('RGB copied: ' + rgb);
    };
    document.getElementById('closeModalBtn').onclick = closeModal;
    modal.addEventListener('click', (e) => { if (e.target === modal) closeModal(); });
</script>
